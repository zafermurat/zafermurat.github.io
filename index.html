
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
padding:15px;
background:#020617;
}

.logo{
font-size:22px;
font-weight:bold;
}

.layout{
display:flex;
height:90vh;
}

.sidebar{
width:260px;
background:#020617;
overflow:auto;
}

.channel{
display:flex;
align-items:center;
padding:10px;
cursor:pointer;
border-bottom:1px solid #1e293b;
}

.channel:hover{
background:#1e293b;
}

.channel img{
width:35px;
height:35px;
margin-right:10px;
}

.player-area{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

video{
width:90%;
max-height:80vh;
background:black;
}
</style>

</head>
<body>

<div class="topbar">
<div class="logo" id="logoToTop">WebTV</div>
</div>

<div class="layout">

<div class="sidebar">
<div id="channelGroups"></div>
</div>

<div class="player-area">
<video id="videoPlayer" controls autoplay playsinline></video>
</div>

</div>

<script>

const video = document.getElementById("videoPlayer");
const channelGroups = document.getElementById("channelGroups");

const m3uUrl = "https://m3u.ch/pl/9147152ccd34d0beef4687960bdc5fb1_76068c9956f2687c48e06e79b7ba486e.m3u";

let hls;

fetch(m3uUrl)
.then(res=>res.text())
.then(data=>{

const lines = data.split("\n");
let channels=[];

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

let name = lines[i].split(",")[1];
let logoMatch = lines[i].match(/tvg-logo="(.*?)"/);

let logo = logoMatch ? logoMatch[1] : "";

let url = lines[i+1];

channels.push({
name:name,
logo:logo,
url:url
});

}

}

channels.forEach(ch=>{

const div=document.createElement("div");
div.className="channel";

div.innerHTML=`
<img src="${ch.logo}" onerror="this.style.display='none'">
<span>${ch.name}</span>
`;

div.onclick=()=>playChannel(ch.url);

channelGroups.appendChild(div);

});

});

function playChannel(url){

if(Hls.isSupported()){

if(hls){
hls.destroy();
}

hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

}else{

video.src=url;

}

}

document.getElementById("logoToTop").onclick=()=>{
document.querySelector(".sidebar").scrollTo({
top:0,
behavior:"smooth"
});
}

</script>

</body>
</html>
