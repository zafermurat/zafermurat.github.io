<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 CANLI TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #080b10;
    --bg2:    #0e1318;
    --bg3:    #141a22;
    --border: rgba(255,255,255,0.06);
    --accent: #e8373d;
    --gold:   #f5c842;
    --text:   #e8eaf0;
    --muted:  #5a6478;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Film grain */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ══ HEADER ══ */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    background: rgba(8,11,16,0.97);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulseDot 1.5s infinite;
  }

  @keyframes pulseDot {
    0%,100% { opacity:1; transform:scale(1); box-shadow:0 0 0 0 rgba(232,55,61,.4); }
    50%      { opacity:.7; transform:scale(1.1); box-shadow:0 0 0 7px rgba(232,55,61,0); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .search-bar {
    display: flex;
    align-items: center;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    gap: 8px;
    transition: border-color .2s;
  }

  .search-bar:focus-within { border-color: rgba(232,55,61,.4); }

  .search-bar input {
    background: none; border: none; outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 200px;
  }

  .search-bar input::placeholder { color: var(--muted); }

  #ch-counter {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* ══ LAYOUT ══ */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 61px);
  }

  /* ══ SIDEBAR ══ */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Tabs */
  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    flex-shrink: 0;
  }

  .tab-btn {
    flex: 1;
    background: none; border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 14px 8px;
    cursor: pointer;
    transition: all .2s;
  }

  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

  /* Category pills */
  .cat-bar {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .cat-bar::-webkit-scrollbar { display: none; }

  .cat-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
  }

  .cat-pill.active, .cat-pill:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .ch-count {
    padding: 8px 16px 4px;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* Channel list scroll area */
  .channel-list {
    overflow-y: auto;
    flex: 1;
    padding: 6px 8px;
  }

  .channel-list::-webkit-scrollbar { width: 4px; }
  .channel-list::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  /* Section title inside list */
  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 10px 4px 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Channel item */
  .channel {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    margin-bottom: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .2s;
    background: rgba(255,255,255,0.02);
  }

  .channel:hover { background: var(--bg3); }

  .channel.active {
    background: rgba(232,55,61,.1);
    border-color: rgba(232,55,61,.25);
  }

  .ch-logo {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .ch-logo img {
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 3px;
    background: #0e1318;
  }

  .ch-info { flex: 1; min-width: 0; }

  .ch-name {
    font-size: 13px; font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ch-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }

  .live-badge {
    background: var(--accent); color: #fff;
    font-size: 9px; font-weight: 700;
    padding: 2px 5px; border-radius: 3px;
    flex-shrink: 0;
  }

  .ch-group {
    font-size: 11px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .fav-btn {
    background: none; border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    transition: color .2s, transform .2s;
    flex-shrink: 0;
    padding: 3px;
    line-height: 1;
  }

  .fav-btn:hover  { color: var(--gold); transform: scale(1.2); }
  .fav-btn.on     { color: var(--gold); }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 12px;
  }

  .spin {
    width: 32px; height: 32px;
    border: 2px solid var(--bg3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══ MAIN ══ */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* ══ PLAYER ══ */
  .player-wrap { position: relative; background: #000; flex-shrink: 0; }

  .player-ratio {
    position: relative;
    width: 100%;
    padding-top: 50%;
    background: #000;
    overflow: hidden;
  }

  .player-idle {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #0d1520 0%, #000 70%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
  }

  .idle-icon {
    font-size: 64px; opacity: .13;
    animation: breathe 3s ease-in-out infinite;
  }

  @keyframes breathe {
    0%,100% { opacity:.08; transform:scale(1); }
    50%      { opacity:.2;  transform:scale(1.05); }
  }

  .idle-txt {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 4px;
    color: var(--muted);
  }

  #video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    background: #000;
    display: none;
  }

  /* Fullscreen hint */
  .fs-hint {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .2s;
    pointer-events: none;
  }

  .player-ratio:hover .fs-hint { opacity: 1; }

  .fs-btn {
    background: rgba(0,0,0,.6);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 8px; color: #fff;
    font-size: 12px; padding: 6px 14px;
    backdrop-filter: blur(4px);
    pointer-events: all;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
  }

  /* ══ CONTROLS BAR ══ */
  .ctrl-bar {
    background: linear-gradient(to right, var(--bg2), var(--bg3));
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
  }

  .np {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1; min-width: 0;
  }

  .np-logo {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
    font-size: 18px;
  }

  .np-logo img {
    width: 100%; height: 100%;
    object-fit: contain; padding: 2px; background: #0e1318;
  }

  .np-title {
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .on-air {
    background: var(--accent); color: #fff;
    font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 3px;
    animation: blink 2s infinite; flex-shrink: 0;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

  .np-group { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .ctrl-btns { display: flex; align-items: center; gap: 8px; }

  .cb {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .2s;
  }

  .cb:hover { background: var(--accent); border-color: var(--accent); color: #fff; transform: translateY(-1px); }
  .cb.danger:hover { background: #c0392b; border-color: #c0392b; }

  .vol-wrap { display: flex; align-items: center; gap: 8px; }

  .vol-sl {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 4px;
    background: var(--bg3); border-radius: 2px;
    outline: none; cursor: pointer;
  }

  .vol-sl::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent); border-radius: 50%; cursor: pointer;
  }

  /* ══ INFO BAR ══ */
  .info-bar { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .info-bar::-webkit-scrollbar { width: 4px; }
  .info-bar::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  .sec-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 2px;
    color: var(--muted); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }

  .sec-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .rel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
  }

  .rel-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 8px;
    cursor: pointer; text-align: center;
    transition: all .2s;
  }

  .rel-card:hover { border-color: rgba(232,55,61,.3); background: var(--bg3); transform: translateY(-2px); }
  .rel-card .rc-icon { font-size: 26px; margin-bottom: 6px; }
  .rel-card .rc-icon img { width: 30px; height: 30px; object-fit: contain; }
  .rel-card .rc-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rel-card .rc-group { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ══ SLEEP MODAL ══ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.8); backdrop-filter: blur(8px);
    z-index: 200; display: none;
    align-items: center; justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 320px;
    animation: slideUp .3s ease;
  }

  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .timer-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }

  .t-opt {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; text-align: center;
    cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--text); transition: all .2s;
  }

  .t-opt:hover, .t-opt.sel {
    background: rgba(232,55,61,.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .t-cd {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 2px;
    color: var(--gold); padding: 6px 0;
    display: none;
  }

  .modal-acts { display: flex; gap: 10px; }

  .btn {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .2s;
  }

  .btn-p { background: var(--accent); color: #fff; }
  .btn-p:hover { background: #c0392b; }
  .btn-s { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
  .btn-s:hover { color: var(--text); }

  /* ══ TOAST ══ */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg2); border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 12px 18px;
    font-size: 13px; font-weight: 500;
    z-index: 500;
    transform: translateY(60px); opacity: 0;
    transition: all .3s; max-width: 280px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* DEV BTN */
  .dev-btn {
    display: flex; align-items: center;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    text-decoration: none; white-space: nowrap; transition: all .2s;
  }
  .dev-btn:hover { background: #229ED9; border-color: #229ED9; color: #fff; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }

  /* ══ MOBİL ══ */
  @media (max-width: 768px) {

    header { padding: 11px 14px; }
    .logo  { font-size: 20px; }
    .logo-dot { width: 8px; height: 8px; }
    .header-right { gap: 8px; }
    #ch-counter { display: none; }

    .search-bar { padding: 7px 10px; gap: 6px; }
    .search-bar input { width: 110px; font-size: 12px; }

    /* Sidebar alta, main üste */
    .app {
      grid-template-columns: 1fr;
      height: auto;
      min-height: 100vh;
    }

    .main    { order: 1; }
    .sidebar { order: 2; border-right: none; border-top: 1px solid var(--border); }

    /* Player 16:9 */
    .player-ratio { padding-top: 56.25%; }
    .idle-icon { font-size: 40px; }
    .idle-txt  { font-size: 13px; letter-spacing: 2px; }

    /* Controls 2 satır */
    .ctrl-bar {
      flex-wrap: wrap;
      padding: 10px 14px;
      gap: 8px;
    }

    .np          { width: 100%; min-width: 0; }
    .np-logo     { width: 30px; height: 30px; }
    .np-title    { font-size: 12px; }
    .np-group    { font-size: 10px; }

    .ctrl-btns   { width: 100%; justify-content: space-between; gap: 5px; }
    .cb          { flex: 1; height: 34px; font-size: 13px; }
    .vol-wrap    { flex: 2; gap: 5px; }
    .vol-sl      { width: 100%; }

    /* Sidebar içi */
    .sidebar-tabs  { padding: 0 12px; }
    .tab-btn       { font-size: 10px; padding: 11px 4px; }
    .cat-bar       { padding: 10px 12px; }
    .ch-count      { padding: 6px 12px 2px; }
    .channel-list  { max-height: 42vh; }

    .channel  { padding: 8px 10px; gap: 10px; }
    .ch-logo  { width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0; }
    .ch-name  { font-size: 12px; }
    .ch-group { font-size: 10px; }

    /* Info bar */
    .info-bar { padding: 12px 14px; }
    .rel-grid { grid-template-columns: repeat(auto-fill, minmax(80px,1fr)); gap: 8px; }
    .rel-card { padding: 10px 6px; }
    .rel-card .rc-name  { font-size: 10px; }
    .rel-card .rc-group { font-size: 9px; }
  }

  /* 380px altı */
  @media (max-width: 380px) {
    .search-bar input { width: 80px; }
    .vol-wrap { display: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    CANLI TV
  </div>
  <div class="header-right">
    <span id="ch-counter"></span>
    <a href="https://t.me/Zaferri" target="_blank" rel="noopener" class="dev-btn">Developer'ı Görüntüle</a>
    <div class="search-bar">
      <span style="font-size:14px;color:var(--muted)">🔍</span>
      <input type="text" placeholder="Kanal ara..." onkeyup="search(this.value)">
    </div>
  </div>
</header>

<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">

    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('all', this)">TÜM KANALLAR</button>
      <button class="tab-btn" onclick="switchTab('fav', this)">⭐ FAVORİLER</button>
    </div>

    <div class="cat-bar" id="catBar">
      <button class="cat-pill active" onclick="filterCat('', this)">Tümü</button>
    </div>

    <div class="ch-count" id="chCount"></div>

    <div class="channel-list" id="channelList">
      <div class="loading">
        <div class="spin"></div>
        Kanallar yükleniyor...
      </div>
    </div>

  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main">

    <!-- PLAYER -->
    <div class="player-wrap">
      <div class="player-ratio">

        <div class="player-idle" id="playerIdle">
          <div class="idle-icon">📺</div>
          <div class="idle-txt">İZLEMEK İÇİN KANAL SEÇİN</div>
        </div>

        <video id="video" controls playsinline></video>

        <div class="fs-hint">
          <button class="fs-btn" onclick="openFS()">⛶ TAM EKRAN</button>
        </div>

      </div>

      <!-- CONTROLS -->
      <div class="ctrl-bar">
        <div class="np">
          <div class="np-logo" id="npLogo">📺</div>
          <div style="min-width:0">
            <div class="np-title" id="npTitle">Kanal Seçilmedi</div>
            <div class="np-group" id="npGroup">Bir kanal seçin</div>
          </div>
        </div>

        <div class="ctrl-btns">
          <div class="vol-wrap">
            <span style="font-size:14px">🔊</span>
            <input type="range" class="vol-sl" min="0" max="100" value="90" oninput="setVol(this.value)">
          </div>
          <button class="cb" onclick="prevCh()" title="Önceki (←)">⏮</button>
          <button class="cb" onclick="nextCh()" title="Sonraki (→)">⏭</button>
          <button class="cb" id="favCurBtn" onclick="favToggleCurrent()" title="Favoriye ekle">☆</button>
          <button class="cb" onclick="openSleep()" title="Uyku zamanlayıcı">⏱</button>
          <button class="cb danger" onclick="stopPlayer()" title="Durdur (Esc)">⏹</button>
        </div>
      </div>
    </div>

    <!-- ÖNERILEN -->
    <div class="info-bar">
      <div class="sec-title">ÖNERİLEN KANALLAR</div>
      <div class="rel-grid" id="relGrid"></div>
    </div>

  </main>
</div>

<!-- SLEEP MODAL -->
<div class="modal-overlay" id="sleepModal">
  <div class="modal">
    <div class="modal-title">⏱ UYKU ZAMANLAYICISI</div>
    <div class="timer-opts">
      <div class="t-opt" onclick="pickTimer(15,this)">15 dk</div>
      <div class="t-opt sel" onclick="pickTimer(30,this)">30 dk</div>
      <div class="t-opt" onclick="pickTimer(60,this)">1 saat</div>
      <div class="t-opt" onclick="pickTimer(90,this)">1.5 saat</div>
      <div class="t-opt" onclick="pickTimer(120,this)">2 saat</div>
      <div class="t-opt" onclick="pickTimer(0,this)">İptal Et</div>
    </div>
    <div class="t-cd" id="timerCd"></div>
    <div class="modal-acts">
      <button class="btn btn-s" onclick="closeSleep()">Vazgeç</button>
      <button class="btn btn-p" onclick="startSleep()">Başlat</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   M3U + PLAYER — senin çalışan mantığın
══════════════════════════════════════════ */
const M3U_URL = "https://m3u.ch/pl/9147152ccd34d0beef4687960bdc5fb1_76068c9956f2687c48e06e79b7ba486e.m3u";

let hls;
let favorites   = JSON.parse(localStorage.getItem("favorites") || "[]");
let allChannels = [];   // { name, url, group, logo }
let activeDiv   = null;
let currentCh   = null;
let currentTab  = "all";
let currentCat  = "";
let searchQ     = "";

/* ── M3U FETCH ── */
fetch(M3U_URL)
  .then(r => r.text())
  .then(text => {
    const lines = text.split("\n");
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].startsWith("#EXTINF")) {
        const name  = lines[i].split(",")[1]?.trim() || "Kanal";
        const url   = lines[i + 1]?.trim() || "";
        if (!url.startsWith("http")) continue;
        const gm    = lines[i].match(/group-title="([^"]*)"/i);
        const lm    = lines[i].match(/tvg-logo="([^"]*)"/i);
        allChannels.push({
          name,
          url,
          group: gm ? gm[1].trim() || "Genel" : "Genel",
          logo:  lm ? lm[1].trim() : ""
        });
      }
    }
    document.getElementById("ch-counter").textContent = allChannels.length + " KANAL";
    buildCats();
    renderList();
    renderRelated();
  })
  .catch(() => {
    document.getElementById("channelList").innerHTML =
      '<div style="padding:20px;color:var(--muted);font-size:13px;text-align:center">❌ Yükleme hatası</div>';
  });

/* ── KATEGORİLER ── */
function buildCats() {
  const groups = ["", ...new Set(allChannels.map(c => c.group))].slice(0, 20);
  const bar = document.getElementById("catBar");
  bar.innerHTML = groups.map((g, i) =>
    `<button class="cat-pill ${i === 0 ? "active" : ""}" onclick="filterCat('${g.replace(/'/g,"\\'")}',this)">${i === 0 ? "Tümü" : g}</button>`
  ).join("");
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll(".cat-pill").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  renderList();
}

/* ── TAB SWITCH ── */
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderList();
}

/* ── SEARCH ── */
function search(q) {
  searchQ = q.toLowerCase();
  renderList();
}

/* ── RENDER LIST ── */
function renderList() {
  let list = allChannels;
  if (currentTab === "fav") list = list.filter(c => favorites.includes(c.url));
  if (currentCat)           list = list.filter(c => c.group === currentCat);
  if (searchQ)              list = list.filter(c => c.name.toLowerCase().includes(searchQ));

  document.getElementById("chCount").textContent = list.length + " kanal";

  const el = document.getElementById("channelList");

  if (!list.length) {
    el.innerHTML = `<div style="text-align:center;padding:40px 16px;color:var(--muted);font-size:13px;">
      ${currentTab === "fav" ? "⭐ Favori yok" : "🔍 Sonuç yok"}
    </div>`;
    return;
  }

  el.innerHTML = list.map(ch => {
    const idx   = allChannels.indexOf(ch);
    const isAct = currentCh?.url === ch.url;
    const isFav = favorites.includes(ch.url);
    const logo  = ch.logo
      ? `<img src="${ch.logo}" loading="lazy" onerror="this.outerHTML='<span>📺</span>'">`
      : `<span>📺</span>`;
    const u = ch.url.replace(/\\/g, "\\\\").replace(/'/g, "\\'");

    return `
      <div class="channel ${isAct ? "active" : ""}" onclick="play(${idx})">
        <div class="ch-logo">${logo}</div>
        <div class="ch-info">
          <div class="ch-name">${ch.name}</div>
          <div class="ch-meta">
            <span class="live-badge">CANLI</span>
            <span class="ch-group">${ch.group}</span>
          </div>
        </div>
        <button class="fav-btn ${isFav ? "on" : ""}"
          onclick="event.stopPropagation(); toggleFavorite('${u}', this)">
          ${isFav ? "★" : "☆"}
        </button>
      </div>`;
  }).join("");
}

/* ── PLAY (senin orijinal mantığın) ── */
const video = document.getElementById("video");

function play(idx) {
  const ch = allChannels[idx];
  if (!ch) return;
  currentCh = ch;

  // Göster
  document.getElementById("playerIdle").style.display = "none";
  video.style.display = "block";

  // HLS — aynen senin kodundan
  if (Hls.isSupported()) {
    if (hls) hls.destroy();
    hls = new Hls();
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = ch.url;
    video.play().catch(() => {});
  } else {
    video.src = ch.url;
  }

  video.volume = document.querySelector(".vol-sl").value / 100;

  // Now Playing bar
  const npLogo = document.getElementById("npLogo");
  npLogo.innerHTML = ch.logo
    ? `<img src="${ch.logo}" style="width:100%;height:100%;object-fit:contain;padding:2px;background:#0e1318" onerror="this.outerHTML='📺'">`
    : "📺";

  document.getElementById("npTitle").innerHTML  = `${ch.name} <span class="on-air">ON AIR</span>`;
  document.getElementById("npGroup").textContent = ch.group;

  updateFavBtn();
  renderList();
  showToast("▶ " + ch.name);
}

/* ── STOP ── */
function stopPlayer() {
  if (hls) { hls.destroy(); hls = null; }
  video.pause(); video.src = ""; video.style.display = "none";
  document.getElementById("playerIdle").style.display = "flex";
  currentCh = null;
  document.getElementById("npTitle").innerHTML   = "Kanal Seçilmedi";
  document.getElementById("npGroup").textContent = "Bir kanal seçin";
  document.getElementById("npLogo").innerHTML    = "📺";
  document.getElementById("favCurBtn").textContent = "☆";
  document.getElementById("favCurBtn").style.color  = "";
  renderList();
}

/* ── PREV / NEXT ── */
function getFiltered() {
  let list = allChannels;
  if (currentTab === "fav") list = list.filter(c => favorites.includes(c.url));
  if (currentCat)           list = list.filter(c => c.group === currentCat);
  if (searchQ)              list = list.filter(c => c.name.toLowerCase().includes(searchQ));
  return list;
}

function nextCh() {
  const list = getFiltered();
  if (!list.length) return;
  const idx  = list.findIndex(c => c.url === currentCh?.url);
  play(allChannels.indexOf(list[(idx + 1) % list.length]));
}

function prevCh() {
  const list = getFiltered();
  if (!list.length) return;
  const idx  = list.findIndex(c => c.url === currentCh?.url);
  play(allChannels.indexOf(list[(idx - 1 + list.length) % list.length]));
}

function setVol(v) { video.volume = v / 100; }

function openFS() {
  const el = document.querySelector(".player-ratio");
  (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
}

/* ── FAVORİLER (senin orijinal mantığın) ── */
function toggleFavorite(url, btn) {
  if (favorites.includes(url)) {
    favorites = favorites.filter(u => u !== url);
    btn.textContent = "☆";
    btn.classList.remove("on");
    showToast("Favorilerden çıkarıldı");
  } else {
    favorites.push(url);
    btn.textContent = "★";
    btn.classList.add("on");
    showToast("⭐ Favorilere eklendi");
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  updateFavBtn();
  renderList();
}

function favToggleCurrent() {
  if (!currentCh) return;
  const btn = document.getElementById("favCurBtn");
  toggleFavorite(currentCh.url, btn);
}

function updateFavBtn() {
  if (!currentCh) return;
  const on  = favorites.includes(currentCh.url);
  const btn = document.getElementById("favCurBtn");
  btn.textContent  = on ? "★" : "☆";
  btn.style.color  = on ? "var(--gold)" : "";
}

/* ── ÖNERILEN ── */
function renderRelated() {
  const pick = [...allChannels].sort(() => Math.random() - .5).slice(0, 10);
  document.getElementById("relGrid").innerHTML = pick.map(ch => {
    const idx = allChannels.indexOf(ch);
    return `
      <div class="rel-card" onclick="play(${idx})">
        <div class="rc-icon">${ch.logo ? `<img src="${ch.logo}" onerror="this.outerHTML='📺'">` : "📺"}</div>
        <div class="rc-name">${ch.name}</div>
        <div class="rc-group">${ch.group}</div>
      </div>`;
  }).join("");
}

/* ── SLEEP TIMER ── */
let sleepSel = 30, sleepTimer = null, cdInterval = null;

function pickTimer(min, el) {
  sleepSel = min;
  document.querySelectorAll(".t-opt").forEach(o => o.classList.remove("sel"));
  el.classList.add("sel");
}

function openSleep()  { document.getElementById("sleepModal").classList.add("open"); }
function closeSleep() { document.getElementById("sleepModal").classList.remove("open"); }

function startSleep() {
  clearTimeout(sleepTimer); clearInterval(cdInterval);
  if (sleepSel === 0) {
    document.getElementById("timerCd").style.display = "none";
    showToast("Zamanlayıcı iptal edildi"); closeSleep(); return;
  }
  sleepTimer = setTimeout(() => {
    stopPlayer();
    showToast("⏱ " + sleepSel + " dk doldu. Yayın durduruldu.");
  }, sleepSel * 60000);
  let rem = sleepSel * 60;
  const cd = document.getElementById("timerCd"); cd.style.display = "block";
  cdInterval = setInterval(() => {
    rem--;
    if (rem <= 0) { clearInterval(cdInterval); cd.style.display = "none"; return; }
    cd.textContent = "⏱ Kalan: " + Math.floor(rem / 60) + ":" + String(rem % 60).padStart(2, "0");
  }, 1000);
  showToast("⏱ " + sleepSel + " dk sonra kapanacak"); closeSleep();
}

document.getElementById("sleepModal").addEventListener("click", e => {
  if (e.target === document.getElementById("sleepModal")) closeSleep();
});

/* ── TOAST ── */
let toastT;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove("show"), 2800);
}

/* ── KEYBOARD ── */
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "ArrowRight") nextCh();
  if (e.key === "ArrowLeft")  prevCh();
  if (e.key === "Escape")     stopPlayer();
  if (e.key === "f" || e.key === "F") openFS();
  if (e.key === "m" || e.key === "M") {
    video.muted = !video.muted;
    showToast(video.muted ? "🔇 Sessiz" : "🔊 Ses Açık");
  }
});
</script>
</body>
</html>
