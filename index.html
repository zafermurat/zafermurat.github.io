<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ULTRA CANLI TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#1e293b,#020617);
color:white;
}

header{
background:#020617;
padding:20px;
font-size:28px;
font-weight:bold;
text-align:center;
letter-spacing:3px;
color:#38bdf8;
text-shadow:0 0 10px #38bdf8;
border-bottom:1px solid rgba(255,255,255,0.1);
position:sticky;
top:0;
z-index:100;
}

.container{
display:flex;
flex-wrap:wrap;
min-height:100vh;
}

.player{
flex:2;
padding:20px;
position:relative;
}

video{
width:100%;
border-radius:20px;
box-shadow:
0 0 20px rgba(0,0,0,0.7),
0 0 40px rgba(59,130,246,0.2);
}

#overlay{
position:absolute;
top:25px;
left:25px;
background:rgba(0,0,0,0.5);
padding:6px 12px;
border-radius:8px;
font-weight:bold;
display:none;
}

.channels{
flex:1;
background:#020617;
height:100vh;
overflow:auto;
padding:15px;
border-left:1px solid rgba(255,255,255,0.1);
}

.search{
width:100%;
padding:10px;
border:none;
border-radius:10px;
margin-bottom:10px;
background:#111827;
color:white;
outline:none;
}

.channel{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
margin-bottom:8px;
border-radius:12px;
background:rgba(255,255,255,0.04);
transition:0.25s;
border:1px solid rgba(255,255,255,0.05);
cursor:pointer;
}

.channel:hover{
background:linear-gradient(90deg,#1f2937,#374151);
transform:scale(1.05);
box-shadow:0 5px 20px rgba(0,0,0,0.7);
}

.favorite{
font-size:18px;
color:#f59e0b;
cursor:pointer;
}

.category-title{
font-weight:bold;
margin:10px 0;
color:#fbbf24;
}

@media(max-width:768px){

.container{
flex-direction:column;
}

.channels{
height:auto;
border-left:none;
border-top:1px solid rgba(255,255,255,0.1);
}

}

</style>
</head>

<body>

<header>🌟 ULTRA CANLI TV</header>

<div class="container">

<div class="player">
<video id="video" controls autoplay></video>
<div id="overlay"></div>
</div>

<div class="channels">

<input class="search" placeholder="Kanal ara..." onkeyup="search(this.value)">

<div id="favorites-container">
<div class="category-title">⭐ Favoriler</div>
<div id="favorites"></div>
</div>

<div class="category-title">📺 Tüm Kanallar</div>
<div id="channels"></div>

</div>

</div>

<script>

const M3U_URL="https://m3u.ch/pl/9147152ccd34d0beef4687960bdc5fb1_76068c9956f2687c48e06e79b7ba486e.m3u";

let hls;
let favorites = JSON.parse(localStorage.getItem("favorites")||"[]");

function renderChannel(name,url){

let div=document.createElement("div");
div.className="channel";

div.innerHTML=`
<span>${name}</span>
<span class="favorite">${favorites.includes(url)?"★":"☆"}</span>
`;

div.onclick=()=>play(url,name);

div.querySelector(".favorite").onclick=e=>{
e.stopPropagation();
toggleFavorite(url,div,name);
}

return div;

}

fetch(M3U_URL)
.then(r=>r.text())
.then(text=>{

let lines=text.split("\n");

let list=document.getElementById("channels");
let favList=document.getElementById("favorites");

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

let name=lines[i].split(",")[1];
let url=lines[i+1];

let div=renderChannel(name,url);

if(favorites.includes(url)){
favList.appendChild(div);
}else{
list.appendChild(div);
}

}

}

});

var video=document.getElementById("video");
var overlay=document.getElementById("overlay");

function play(url,name){

overlay.style.display="block";
overlay.innerText=name;

if(Hls.isSupported()){

if(!hls) hls=new Hls();

hls.loadSource(url);
hls.attachMedia(video);

}else{

video.src=url;

}

}

function toggleFavorite(url,div,name){

let favList=document.getElementById("favorites");
let channelList=document.getElementById("channels");

if(favorites.includes(url)){

favorites=favorites.filter(u=>u!==url);
div.querySelector(".favorite").innerText="☆";
channelList.appendChild(div);

}else{

favorites.push(url);
div.querySelector(".favorite").innerText="★";
favList.appendChild(div);

}

localStorage.setItem("favorites",JSON.stringify(favorites));

}

function search(q){

q=q.toLowerCase();

document.querySelectorAll(".channel").forEach(c=>{

let name=c.querySelector("span").innerText.toLowerCase();

c.style.display=name.includes(q)?"flex":"none";

});

}

</script>

</body>
</html>
