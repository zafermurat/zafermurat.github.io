<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CANLI TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:linear-gradient(90deg,#2563eb,#06b6d4);
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
letter-spacing:2px;
box-shadow:0 4px 20px rgba(0,0,0,0.5);
}

.container{
display:flex;
flex-wrap:wrap;
}

.player{
flex:2;
padding:20px;
}

video{
width:100%;
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.8);
}

.channels{
flex:1;
background:#020617;
height:100vh;
overflow:auto;
padding:15px;
border-left:2px solid rgba(255,255,255,0.1);
}

.search{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-bottom:10px;
font-size:15px;
outline:none;
}

.channel{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
padding:12px;
border-radius:10px;
margin-bottom:8px;
background:rgba(255,255,255,0.05);
transition:0.3s;
}

.channel:hover{
background:linear-gradient(90deg,#4facfe,#00f2fe);
transform:scale(1.03);
}

.channel img{
width:50px;
height:30px;
object-fit:contain;
}

</style>

</head>

<body>

<header>📺 ELITE TV</header>

<div class="container">

<div class="player">
<video id="video" controls autoplay></video>
</div>

<div class="channels">

<input class="search" placeholder="Kanal ara..." onkeyup="search(this.value)">

<div id="channels"></div>

</div>

</div>

<script>

const M3U_URL="https://m3u.ch/pl/9147152ccd34d0beef4687960bdc5fb1_76068c9956f2687c48e06e79b7ba486e.m3u";

fetch(M3U_URL)
.then(r=>r.text())
.then(text=>{

let lines=text.split("\n");

let list=document.getElementById("channels");

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

let name=lines[i].split(",")[1];

let logoMatch = lines[i].match(/tvg-logo="(.*?)"/);
let logo = logoMatch ? logoMatch[1] : "";

let url=lines[i+1];

let div=document.createElement("div");

div.className="channel";

div.innerHTML = `
${logo ? `<img src="${logo}">` : ""}
<span>${name}</span>
`;

div.onclick=()=>play(url);

list.appendChild(div);

}

}

});

var video=document.getElementById("video");

function play(url){

if(Hls.isSupported()){

var hls=new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}else{

video.src=url;

}

}

function search(q){

q=q.toLowerCase();

document.querySelectorAll(".channel").forEach(c=>{

let name=c.innerText.toLowerCase();

c.style.display=name.includes(q)?"flex":"none";

});

}

</script>

</body>
</html>
