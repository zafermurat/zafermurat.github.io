<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Proxy Player</title>
</head>
<body>

<h2>Video Proxy Test</h2>

<input type="text" id="videoUrl" placeholder="Video URL gir">
<button onclick="loadVideo()">Oynat</button>

<br><br>

<video id="player" controls width="600"></video>

<script>
async function loadVideo() {
    const url = document.getElementById("videoUrl").value;

    if(!url){
        alert("URL gir");
        return;
    }

    const proxy = "https://za.zafermurat-111.workers.dev/?url=" + encodeURIComponent(url);

    document.getElementById("player").src = proxy;
}
</script>

</body>
</html>
