<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>🌟 CANLI TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
}
header{
  background: linear-gradient(90deg,#0f172a,#111827);
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  letter-spacing:2px;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  color:#f3f4f6;
  position:sticky;
  top:0;
  z-index:100;
}
.container{
  display:flex;
  flex-wrap:wrap;
  min-height:100vh;
}
.player{
  flex:2;
  padding:20px;
  min-width:300px;
  position:relative;
}
video{
  width:100%;
  border-radius:15px;
  box-shadow:0 10px 40px rgba(0,0,0,0.8);
}
#overlay{
  position:absolute;
  top:15px;
  left:15px;
  background: rgba(0,0,0,0.5);
  padding:5px 10px;
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  display:none;
}
#overlay img{
  width:40px;
  height:25px;
  object-fit:contain;
  border-radius:4px;
}
.channels{
  flex:1;
  background:#111827;
  height:100vh;
  overflow:auto;
  padding:15px;
  border-left:2px solid rgba(255,255,255,0.1);
  min-width:200px;
}
.search{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-bottom:10px;
  font-size:15px;
  outline:none;
  background:#1f1f1f url('https://cdn-icons-png.flaticon.com/512/622/622669.png') no-repeat 10px center;
  padding-left:35px;
  color:white;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
}
.channel{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
  background:rgba(255,255,255,0.05);
  transition:0.3s;
}
.channel:hover{
  background:linear-gradient(90deg,#374151,#1f2937);
  transform:scale(1.03);
}
.channel img{
  width:50px;
  height:30px;
  object-fit:contain;
  border-radius:4px;
}
.favorite{
  margin-left:auto;
  cursor:pointer;
  font-size:18px;
  color:#f59e0b;
}
@media(max-width:768px){
  .container { flex-direction:column; }
  .channels { height:auto; border-left:none; border-top:2px solid rgba(255,255,255,0.1); }
}
</style>
</head>
<body>
<header>🌟 CANLI TV</header>
<div class="container">
  <div class="player">
    <video id="video" controls autoplay></video>
    <div id="overlay">
      <img id="overlayLogo" src="">
      <span id="overlayName"></span>
    </div>
  </div>
  <div class="channels">
    <input class="search" placeholder="Kanal ara..." onkeyup="search(this.value)">
    <div id="channels"></div>
  </div>
</div>

<script>
const M3U_URL="https://m3u.ch/pl/9147152ccd34d0beef4687960bdc5fb1_76068c9956f2687c48e06e79b7ba486e.m3u";
let hls;
let favorites = JSON.parse(localStorage.getItem("favorites")||"[]");

function createChannelDiv(name,url,logo){
  let div = document.createElement("div");
  div.className="channel";
  div.dataset.url = url;
  div.innerHTML = `
    <img src="${logo || 'https://via.placeholder.com/50x30?text=TV'}">
    <span>${name}</span>
    <span class="favorite">${favorites.includes(url)?"★":"☆"}</span>
  `;
  div.onclick=()=>play(url,name,logo);
  div.querySelector(".favorite").onclick = e=>{
    e.stopPropagation();
    toggleFavorite(url, div);
  }
  return div;
}

function toggleFavorite(url, div){
  const favIcon = div.querySelector(".favorite");
  if(favorites.includes(url)){
    favorites = favorites.filter(u=>u!==url);
    favIcon.innerText="☆";
  } else {
    favorites.push(url);
    favIcon.innerText="★";
  }
  localStorage.setItem("favorites",JSON.stringify(favorites));
  sortChannels();
}

function sortChannels(){
  const list = document.getElementById("channels");
  let channels = Array.from(list.children);
  channels.sort((a,b)=>{
    let aFav = favorites.includes(a.dataset.url);
    let bFav = favorites.includes(b.dataset.url);
    return (aFav===bFav)?0 : aFav? -1 : 1;
  });
  channels.forEach(c=>list.appendChild(c));
}

fetch(M3U_URL)
.then(r=>r.text())
.then(text=>{
  let lines=text.split("\n");
  let list=document.getElementById("channels");
  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith("#EXTINF")){
      let name=lines[i].split(",")[1];
      let logoMatch = lines[i].match(/tvg-logo="(.*?)"/);
      let logo = logoMatch ? logoMatch[1] : "";
      let url=lines[i+1];
      let div = createChannelDiv(name,url,logo);
      div.dataset.url=url;
      list.appendChild(div);
    }
  }
  sortChannels(); // Favoriler başa
});

var video=document.getElementById("video");
var overlay=document.getElementById("overlay");
function play(url,name,logo){
  overlay.style.display="flex";
  document.getElementById("overlayName").innerText=name;
  document.getElementById("overlayLogo").src = logo || "https://via.placeholder.com/50x30?text=TV";
  
  if(Hls.isSupported()){
    if(!hls) hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src=url;
  }
}

function search(q){
  q=q.toLowerCase();
  document.querySelectorAll(".channel").forEach(c=>{
    let name=c.querySelector("span").innerText.toLowerCase();
    c.style.display=name.includes(q)?"flex":"none";
  });
}
</script>
</body>
</html>
