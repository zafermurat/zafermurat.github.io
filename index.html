<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV MASTER PANEL</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
display:flex;
}

.player{
flex:2;
padding:20px;
}

video{
width:100%;
border-radius:10px;
}

.channels{
flex:1;
background:#020617;
height:100vh;
overflow:auto;
padding:10px;
}

.channel{
padding:10px;
background:#111827;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
}

.channel:hover{
background:#1f2937;
}

.admin{
position:fixed;
bottom:20px;
right:20px;
background:#f59e0b;
padding:12px;
border-radius:50%;
cursor:pointer;
font-size:20px;
}

.panel{
position:fixed;
top:0;
right:-400px;
width:400px;
height:100%;
background:#020617;
transition:0.4s;
padding:20px;
overflow:auto;
}

.panel.open{
right:0;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
background:#111827;
border:none;
color:white;
}

button{
padding:10px;
background:#2563eb;
border:none;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<header>📺 IPTV MASTER PANEL</header>

<div class="container">

<div class="player">
<video id="video" controls autoplay></video>
</div>

<div class="channels" id="channels"></div>

</div>

<div class="admin" onclick="togglePanel()">⚙</div>

<div class="panel" id="panel">

<h2>Kanal Ekle</h2>

<input id="name" placeholder="Kanal adı">

<input id="url" placeholder="M3U8 link">

<input id="logo" placeholder="Logo url">

<select id="group">

<option>Türkiye</option>
<option>Spor</option>
<option>Film</option>
<option>Haber</option>

</select>

<button onclick="addChannel()">Kanal Ekle</button>

<hr>

<h2>Kanal Listesi</h2>

<div id="adminList"></div>

</div>

<script>

let channels=JSON.parse(localStorage.getItem("channels")||"[]")

let hls

function draw(){

let list=document.getElementById("channels")
let admin=document.getElementById("adminList")

list.innerHTML=""
admin.innerHTML=""

channels.forEach((c,i)=>{

let div=document.createElement("div")

div.className="channel"
div.innerText=c.name

div.onclick=()=>play(c.url)

list.appendChild(div)

let a=document.createElement("div")

a.innerHTML=c.name+" <button onclick='removeChannel("+i+")'>Sil</button>"

admin.appendChild(a)

})

}

function play(url){

let video=document.getElementById("video")

if(Hls.isSupported()){

if(!hls)hls=new Hls()

hls.loadSource(url)
hls.attachMedia(video)

}else{

video.src=url

}

}

function addChannel(){

let name=document.getElementById("name").value
let url=document.getElementById("url").value
let logo=document.getElementById("logo").value
let group=document.getElementById("group").value

channels.push({name,url,logo,group})

localStorage.setItem("channels",JSON.stringify(channels))

draw()

}

function removeChannel(i){

channels.splice(i,1)

localStorage.setItem("channels",JSON.stringify(channels))

draw()

}

function togglePanel(){

document.getElementById("panel").classList.toggle("open")

}

draw()

</script>

</body>
</html>
